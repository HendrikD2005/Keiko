name: User Finding
description: Report a bug or defect found while using Keiko.
labels: ["User Findings", "bug", "status: new"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form for bugs found by pilot or production users.

        Do not include API keys, customer data, private screenshots, internal model endpoints, private logs, or other secrets. Redact sensitive values before submitting.

        Maintainers and agents must track this finding in the public Keiko Product Delivery project. New reports start with project `Status` = `Open Issues`, `Workflow State` = `New`, and label `status: new`. When an agent claims the finding, it must set `Status` and `Workflow State` to `In Progress`, fill `Owner / Agent`, `Branch`, `Pull Request`, and keep `Human Review Required` set to `Yes`. When the PR is ready, use `Workflow State` = `Ready for Human Review` and label `status: ready for human review`; mark `Done` only after merge, closure evidence, and issue closure.

  - type: input
    id: version
    attributes:
      label: Keiko version
      description: Enter the installed Keiko version.
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Select the operating system where the issue occurred.
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser
      description: Enter the browser and version if the UI is involved.
      placeholder: e.g. Chrome 125

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the problem in one or two sentences.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the exact steps needed to reproduce the issue.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected result
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual result
      description: What happened instead?
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Add redacted screenshots, console output, or logs if available.
      placeholder: Redacted evidence only. Do not include secrets or customer data.

  - type: dropdown
    id: user_impact
    attributes:
      label: User impact
      description: Select the highest observed impact.
      options:
        - Degrades core workflow
        - Degrades secondary workflow
        - Cosmetic or minor
        - Data loss or security concern
    validations:
      required: true

  # ── OPTION A: Maintainer release impact triage ──────────────────────────────
  # Each field is its own element → label always visible, never disappears.

  - type: markdown
    attributes:
      value: "---\n### Maintainer release impact triage\n*Maintainers and agents only. Reporters may leave the fields below blank.*"

  - type: dropdown
    id: release_note_category
    attributes:
      label: "Release-note category"
      options:
        - "(leave blank)"
        - bug-fix
        - improvement
        - breaking-change
        - security
        - none

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - "(leave blank)"
        - "P0 – Critical"
        - "P1 – High"
        - "P2 – Medium"
        - "P3 – Low"

  - type: dropdown
    id: user_visible_change
    attributes:
      label: User-visible change
      options:
        - "(leave blank)"
        - "Yes"
        - "No"
        - "Partial"

  - type: textarea
    id: release_note_bullet
    attributes:
      label: Release-note bullet
      description: One-line entry for the changelog.
      placeholder: e.g. Fixed crash when opening Quality Intelligence with no model configured.

  - type: input
    id: supported_from_versions
    attributes:
      label: Supported-from versions
      placeholder: "e.g. ≥ 0.2.0"

  - type: input
    id: affected_state_stores
    attributes:
      label: Affected state stores
      placeholder: "e.g. MemoriaViva, evidence manifests"

  - type: textarea
    id: user_action_remediation
    attributes:
      label: User action required and remediation
      placeholder: Steps the user needs to take, if any.

  - type: textarea
    id: internal_rationale
    attributes:
      label: Internal-only rationale
      placeholder: Internal context not suitable for the release note.

  # ── end of triage section ────────────────────────────────────────────────────

  - type: checkboxes
    id: submission_safety
    attributes:
      label: Submission safety
      options:
        - label: I have removed secrets, API keys, customer data, private endpoints, and private logs from this report.
          required: true
